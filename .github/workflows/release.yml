name: Build & Release Extensions

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      chunk_size:
        description: "Extensions per parallel build job"
        required: false
        default: "4"
      force_all:
        description: "Rebuild every extension regardless of versionCode"
        required: false
        type: boolean
        default: false

jobs:
  release:
    uses: operation-grimoire/extensions-ci/.github/workflows/release.yml@v1
    secrets: inherit
    permissions:
      contents: write
      packages: read
    with:
      chunk_size: ${{ inputs.chunk_size || '4' }}
      force_all:  ${{ inputs.force_all  || false }}
