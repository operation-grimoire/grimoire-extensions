name: Build & Release Extensions

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      chunk_size:
        description: "Extensions per parallel build job"
        required: false
        default: "4"
      force_all:
        description: "Rebuild every extension regardless of versionCode"
        required: false
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.scan.outputs.matrix }}
      has_changes: ${{ steps.scan.outputs.has_changes }}
      changed_count: ${{ steps.scan.outputs.changed_count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version-bumped extensions
        id: scan
        env:
          INDEX_URL: ${{ github.server_url }}/${{ github.repository }}/releases/download/latest/index.json
          CHUNK_SIZE: ${{ inputs.chunk_size || '4' }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          FORCE_ALL: ${{ inputs.force_all || 'false' }}
        run: python3 scripts/detect_changes.py

      - name: Summary
        run: |
          echo "changed_count=${{ steps.scan.outputs.changed_count }}"
          echo "has_changes=${{ steps.scan.outputs.has_changes }}"
          echo "matrix=${{ steps.scan.outputs.matrix }}"

  build:
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build release APKs (chunk ${{ matrix.chunk }})
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          targets=""
          for m in ${{ matrix.modules }}; do
            targets="$targets $m:assembleRelease"
          done
          echo "Building:$targets"
          ./gradlew $targets --build-cache

      - name: Sign APKs
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > keystore.jks
          BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
          APKSIGNER="$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner"

          for apk in $(find src -path "*/build/outputs/apk/release/*-unsigned.apk"); do
            out="${apk/-unsigned/}"
            "$APKSIGNER" sign \
              --ks keystore.jks \
              --ks-key-alias "$KEY_ALIAS" \
              --ks-pass pass:"$KEY_STORE_PASSWORD" \
              --key-pass pass:"$KEY_PASSWORD" \
              --out "$out" \
              "$apk"
            echo "Signed: $out"
          done
          rm -f keystore.jks

      - name: Collect APKs
        run: |
          mkdir -p repo
          for m in ${{ matrix.modules }}; do
            # ":en-novelfull" -> "en/novelfull"
            mod="${m#:}"
            lang="${mod%%-*}"
            name="${mod#${lang}-}"
            apk=$(find "src/$lang/$name/build/outputs/apk/release" -name "*-release.apk" ! -name "*-unsigned*" 2>/dev/null | head -1)
            if [ -z "$apk" ]; then
              echo "::error::No signed APK for $mod"
              exit 1
            fi
            cp "$apk" "repo/${lang}-${name}.apk"
            echo "Collected: repo/${lang}-${name}.apk"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: apks-chunk-${{ matrix.chunk }}
          path: repo/*.apk
          if-no-files-found: error
          retention-days: 1

  release:
    needs: [detect, build]
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: repo
          pattern: apks-chunk-*
          merge-multiple: true

      - name: List collected APKs
        run: ls -lh repo/

      - name: Generate merged index.json
        env:
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}/releases/download/latest
          INDEX_URL: ${{ github.server_url }}/${{ github.repository }}/releases/download/latest/index.json
        run: python3 scripts/generate_index.py

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Extension Repository
          body: |
            Auto-generated on every push to main.
            Updated ${{ needs.detect.outputs.changed_count }} extension(s) in this run.
          files: |
            repo/*.apk
            repo/*.png
            index.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
